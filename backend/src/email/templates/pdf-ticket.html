<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Tiket</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      color: #0a0a0a;
      margin: 0;
      padding: 24px;
      background: #ffffff;
    }
    .card {
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title { font-size: 20px; font-weight: 600; }
    .code {
      font-size: 12px;
      color: #6b7280;
      font-family: 'Courier New', monospace;
    }
    .divider { height: 1px; background: #e5e7eb; margin: 16px 0; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 16px;
    }
    .section h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; margin: 6px 0; }
    .label { font-size: 12px; color: #6b7280; }
    .value { font-size: 13px; font-weight: 500; color: #0a0a0a; }
    .qr {
      border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; text-align: center;
    }
    .qr img { width: 180px; height: 180px; object-fit: contain; }
    .footer { margin-top: 16px; font-size: 12px; color: #6b7280; text-align: center; }
  </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="title">Tiket Event</div>
        <div class="code">Kode: {{ticketCode}}</div>
      </div>
      <div class="divider"></div>
      <div class="grid">
        <div>
          <div class="section">
            <h4>Event</h4>
            <div class="row"><span class="label">Nama</span><span class="value">{{eventName}}</span></div>
            <div class="row"><span class="label">Kategori</span><span class="value">{{categoryName}}</span></div>
            <div class="row"><span class="label">Tanggal</span><span class="value">{{startDate}}</span></div>
            <div class="row"><span class="label">Sampai</span><span class="value">{{endDate}}</span></div>
            <div class="row"><span class="label">Lokasi</span><span class="value">{{location}}</span></div>
          </div>
          <div class="section" style="margin-top: 12px;">
            <h4>Pengunjung</h4>
            <div class="row"><span class="label">Nama</span><span class="value">{{attendeeName}}</span></div>
          </div>
        </div>
        <div class="qr">
          <h4>QR Code</h4>
          <img src="data:image/png;base64,{{qrCode}}" alt="QR Code" />
          <div class="label" style="margin-top: 8px;">Scan saat check-in</div>
        </div>
      </div>
      <div class="footer">© 2025 Ticketing App</div>
    </div>
  </body>
</html>
